<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us - Enactus ISTIC</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            background: radial-gradient(circle at top, #111 0%, #000 100%);
            color: white;
        }

        .coming-container {
            height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
        }

        .meme-box {
            padding: 30px 40px;
            border: 2px dashed #fcc203;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 0 25px rgba(252, 194, 3, 0.2);
            animation: float 3s ease-in-out infinite;
        }

        .coming-text {
            font-size: 3rem;
            font-weight: 900;
            color: #fcc203;
            letter-spacing: 3px;
        }

        .sub-text {
            margin-top: 10px;
            color: #aaa;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>

<body>

<!-- NAVBAR (same as your main page) -->
<nav class="navbar navbar-expand-md p-2 sticky-top custom-nav">
    <div class="container-fluid">
        <a class="navbar-brand" href="index.html">
            <img src="logo.jpg" class="rounded-circle logo-nav border border-dark" style="width:45px;">
        </a>

        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav align-items-center">
                <li class="nav-item"><a href="index.html" class="nav-link">HOME</a></li>
                <li class="nav-item"><a href="events.html" class="nav-link">EVENTS</a></li>
                <li class="nav-item"><a href="index.html#about" class="nav-link">ABOUT US</a></li>
                <li class="nav-item"><a href="index.html#partners" class="nav-link">PARTNERS</a></li>
            </ul>
        </div>

        <div class="d-none d-md-block">
            <a href="joinus.html" class="btn-join active">JOIN US</a>
        </div>
    </div>
</nav>

<!-- CENTER CONTENT -->
<section class="coming-container">
    <div class="meme-box">
        <div class="coming-text">COMING SOON 🚀</div>
        <p class="sub-text">We are building something awesome for you.</p>
        <p class="sub-text">Stay tuned 👀</p>
    </div>
</section>

<!-- FOOTER -->
<footer class="text-center py-3 text-secondary">
    <small>© 2026 Enactus ISTIC</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
