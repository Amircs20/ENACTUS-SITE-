<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Join Us - Enactus ISTIC</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* ================= BASE ================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #000;
    color: white;
    overflow-x: hidden;
}

/* ================= STAR BACKGROUND ================= */
.stars {
    position: fixed;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    z-index: 0;
    background: transparent;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    border-radius: 50%;
    opacity: 0.5;
    animation: twinkle 3s infinite ease-in-out;
}

@keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.8); }
}

/* ================= NAV ================= */
.navbar {
    z-index: 10;
}

/* ================= CENTER CONTENT ================= */
.container-center {
    position: relative;
    z-index: 2;
    height: 90vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}

/* ================= GLASS CARD ================= */
.card-coming {
    padding: 50px 60px;
    border-radius: 25px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(252, 194, 3, 0.15);
    animation: float 4s ease-in-out infinite;
    max-width: 600px;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
    100% { transform: translateY(0px); }
}

/* ================= TEXT ================= */
.title {
    font-size: 3rem;
    font-weight: 900;
    color: #fcc203;
    letter-spacing: 2px;
}

.subtitle {
    color: #bbb;
    margin-top: 15px;
    font-size: 1.1rem;
}

.badge-coming {
    display: inline-block;
    margin-top: 15px;
    padding: 6px 15px;
    border-radius: 50px;
    border: 1px solid #fcc203;
    color: #fcc203;
    font-size: 0.9rem;
}

/* ================= BUTTON ================= */
.btn-join {
    margin-top: 25px;
    display: inline-block;
    padding: 10px 25px;
    border-radius: 50px;
    border: 1px solid #fcc203;
    color: #fcc203;
    text-decoration: none;
    transition: 0.3s;
}

.btn-join:hover {
    background: #fcc203;
    color: #000;
}
</style>
</head>

<body>

<!-- STAR BACKGROUND -->
<div class="stars" id="stars"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-md navbar-dark p-3">
    <div class="container-fluid">
        <a class="navbar-brand text-warning fw-bold" href="index.html">
            Enactus ISTIC
        </a>
    </div>
</nav>

<!-- MAIN CONTENT -->
<section class="container-center">
    <div class="card-coming">
        <div class="badge-coming">COMING SOON</div>
        <div class="title">JOIN US 🚀</div>
        <div class="subtitle">
            We are preparing something powerful for the next Enactus ISTIC recruitment wave.
            <br>
            Stay tuned — opportunities are coming soon.
        </div>

        <a href="index.html" class="btn-join">Back to Home</a>
    </div>
</section>

<script>
/* ================= STAR GENERATOR ================= */
const starsContainer = document.getElementById("stars");

for (let i = 0; i < 120; i++) {
    let star = document.createElement("div");
    star.classList.add("star");

    star.style.top = Math.random() * 100 + "vh";
    star.style.left = Math.random() * 100 + "vw";

    let size = Math.random() * 2 + 1;
    star.style.width = size + "px";
    star.style.height = size + "px";

    star.style.animationDuration = (Math.random() * 3 + 2) + "s";
    star.style.opacity = Math.random();

    starsContainer.appendChild(star);
}
</script>

</body>
</html>
